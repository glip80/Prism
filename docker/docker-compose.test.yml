version: '3.8'

services:
  # Test databases
  test-postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: dashboard_test
    volumes:
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  test-mongo:
    image: mongo:7-jammy
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 5s
      timeout: 5s
      retries: 5

  # Services under test
  auth-service-test:
    build:
      context: ../backend/auth
      dockerfile: Dockerfile.test
    environment:
      - NODE_ENV=test
      - DATABASE_URL=postgresql://test:test@test-postgres:5432/dashboard_test
      - REDIS_URL=redis://test-redis:6379
      - JWT_SECRET=test-secret-12345
    depends_on:
      test-postgres:
        condition: service_healthy
      test-redis:
        condition: service_healthy
    volumes:
      - ../backend/auth:/app
      - /app/node_modules
    command: npm run test:watch

  # API Gateway for integration tests
  test-gateway:
    image: nginx:alpine
    volumes:
      - ./nginx.test.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - auth-service-test
      - layout-service-test

  # Newman/Postman for API testing
  newman:
    image: postman/newman:alpine
    volumes:
      - ../tests/integration:/etc/newman
    command: run collection.json --environment environment.json
    depends_on:
      - test-gateway
