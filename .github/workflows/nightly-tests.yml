name: Nightly Tests

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  full-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Full Stack
        run: |
          docker compose up -d --build
          sleep 60

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Backend Tests
        run: |
          cd backend/auth && npm ci && npx jest --passWithNoTests || true
          cd ../layout && npm ci && npx jest --passWithNoTests || true
          cd ../widget && npm ci && npx jest --passWithNoTests || true

      - name: Run Frontend Tests
        run: |
          cd frontend && npm ci
          npx vitest run || true

      - name: Run E2E Tests
        run: |
          cd frontend && npx playwright install --with-deps
          npx playwright test || true

      - name: Security Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'

      - name: Cleanup
        if: always()
        run: docker compose down -v

      - name: Notify Slack
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          channel: '#alerts'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
